name = "TorusHamiltonDecompositionProgram"
version = "0.1.0"
keywords = ["lean4", "mathlib", "graph-theory", "hamiltonian-cycles", "cayley-digraphs"]
defaultTargets = ["D5Odd", "D7Odd"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0-rc2"

[[lean_lib]]
name = "D5Odd"

[[lean_lib]]
name = "D7Odd"

[[lean_lib]]
name = "TorusD4"

[[lean_lib]]
name = "TorusD3Odd"

[[lean_lib]]
name = "Shared"

[[lean_lib]]
name = "RoundComposite"
